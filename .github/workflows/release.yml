name: Release

# Tag-triggered GitHub Release. The plugin is distributed via a git-hosted
# Claude Code marketplace — no artifact to build or publish. This workflow
# just verifies version consistency and creates a release with the changelog
# excerpt. See docs/RELEASING.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Determine prerelease
        id: channel
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Confirm plugin.json version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          expected="${TAG#v}"
          manifest=$(python3 -c 'import json; print(json.load(open("noirdoc/.claude-plugin/plugin.json"))["version"])')
          echo "Tag expects:      $expected"
          echo "Manifest reports: $manifest"
          test "$expected" = "$manifest"

      - name: Extract changelog section for this tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $TAG — see CHANGELOG.md for details." > release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ steps.channel.outputs.prerelease }}
