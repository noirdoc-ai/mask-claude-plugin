# .noirdoc/config.toml — workspace config for the noirdoc Claude Code plugin.
# Generated by /noirdoc-setup. Safe to edit by hand. Safe to commit to version control.

[noirdoc]
# The namespace used for redact/reveal round-trips in this workspace.
# The reversible mapping is stored at ~/.noirdoc/namespaces/<namespace>/ — treat as sensitive.
namespace = "REPLACE_ME"

[noirdoc.guard]
# When true, the PreToolUse hook blocks reads of files matching `protected_paths`
# (minus `allowlist`). Set to false to disable protection without uninstalling.
enabled = true

# Glob patterns (relative to this config's directory) that should NOT be read raw.
# Default set protects common sensitive-document conventions.
protected_paths = [
  "./incoming/**",
  "./clients/**",
  "./contracts/**",
  "*.contract.*",
  "*.nda.*",
  "*.patient.*",
]

# Paths that should always be readable despite matching `protected_paths`.
# Extend via /noirdoc-allow — only for files you've confirmed contain no personal data.
allowlist = []

[noirdoc.cache]
# Where redacted copies land. Should be gitignored.
dir = ".noirdoc/cache"
