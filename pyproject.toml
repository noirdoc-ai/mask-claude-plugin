# The plugin itself is distributed via the Claude Code plugin marketplace, not PyPI.
# This file exists only to configure developer tooling (pytest, ruff, mypy) for the
# stdlib-only hook script and its tests.

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["noirdoc/hooks"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
strict = false
